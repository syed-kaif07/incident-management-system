services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "api.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ims
      POSTGRES_DSN: postgresql+asyncpg://ims:ims@postgres:5432/ims
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["uvicorn", "ingestion.app.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "2"]
    environment:
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ims
      POSTGRES_DSN: postgresql+asyncpg://ims:ims@postgres:5432/ims
      RATE_LIMIT_PER_SECOND: 15000
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "workers.app.main"]
    environment:
      REDIS_URL: redis://redis:6379/0
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ims
      POSTGRES_DSN: postgresql+asyncpg://ims:ims@postgres:5432/ims
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  mongo_data:
  redis_data:
